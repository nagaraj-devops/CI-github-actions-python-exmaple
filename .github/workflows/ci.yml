name: Python CI Pipeline

on: [push] # Trigger this whenever code is pushed

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Use a fresh Linux virtual machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls your code into the VM

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run Tests
        run: pytest test_app.py
